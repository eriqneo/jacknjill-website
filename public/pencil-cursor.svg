<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none">
  <!-- Graphite point — apex at very top -->
  <polygon points="14,8 18,8 16,2" fill="#444444"/>
  <!-- Wooden cone / sharpened tip -->
  <polygon points="10,12 22,12 18,8 14,8" fill="#F5C97A"/>
  <!-- Pencil body (bright blue) -->
  <rect x="10" y="12" width="12" height="14" rx="1" ry="1" fill="#1E90FF"/>
  <!-- Shine stripe on body -->
  <rect x="14" y="13" width="2" height="12" rx="1" fill="#FFFFFF" opacity="0.25"/>
  <!-- Eraser band (red) -->
  <rect x="10" y="26" width="12" height="3" fill="#FF6B6B"/>
  <!-- Eraser cap (pink) — rounded bottom -->
  <rect x="11" y="29" width="10" height="3" rx="1.5" ry="1.5" fill="#FFB3B3"/>
</svg>
